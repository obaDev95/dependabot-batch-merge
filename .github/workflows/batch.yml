name: Dependabot batch merge

# Centralised orchestrator: dispatched from this repo, operates on the
# Maersk-Global/ui-myfinance repository. v1 is hard-locked to that single
# target — the action's config parser rejects any other target-repo value.
# Onboarding additional teams is a deliberate follow-up that requires a
# code change here (and a new release tag).
#
# Required repo secrets:
#   TARGET_REPO_PAT  — PAT with Contents: RW + Pull requests: RW on
#                      Maersk-Global/ui-myfinance, AND Packages: Read on every
#                      Maersk-Global repo publishing a private npm package
#                      consumed by ui-myfinance (classic PAT alternative:
#                      read:packages for the org). Required for the action's
#                      internal `npm ci` to authenticate against
#                      npm.pkg.github.com — without it, every PR fails
#                      validation with HTTP 401 "authentication token not
#                      provided".
#   CURSOR_API_KEY   — optional. Cursor Cloud API key for failure explanations.

on:
  workflow_dispatch:
    inputs:
      target-repo:
        description: 'Target repository. v1 only accepts "Maersk-Global/ui-myfinance"; any other value will be rejected by the action.'
        required: true
        type: string
        default: 'Maersk-Global/ui-myfinance'
      validation-command:
        description: 'Shell command run after each merge to validate.'
        required: true
        type: string
        default: 'npm ci && npm run typecheck && npm test && npm run build'
      max-prs:
        description: 'Safety cap on Dependabot PRs processed in one run. Increase if the backlog has grown beyond the default; the action otherwise picks the oldest N PRs and silently skips the rest.'
        required: false
        type: number
        default: 50
      close-source-prs:
        description: 'Close each successfully merged source Dependabot PR with a "Bundled into batch PR #X" comment after the batch PR is opened/updated.'
        required: false
        type: boolean
        default: false

jobs:
  run:
    runs-on: ubuntu-latest
    # Job-level so the env propagates into the dependabot-batch-merge action's
    # child shell when it runs `bash -lc <validation-command>` (i.e. npm ci).
    # Without this, the .npmrc below references ${NODE_AUTH_TOKEN} but the
    # variable is unset inside the action's subprocess and npm 401s.
    env:
      NODE_AUTH_TOKEN: ${{ secrets.TARGET_REPO_PAT }}
    steps:
      # Pre-flight: surface a clear error if the PAT secret is missing.
      # Without this step, the first failure is the cryptic "Input required and
      # not supplied: token" from actions/checkout, which doesn't hint that the
      # underlying cause is an unset repository secret.
      - name: Verify TARGET_REPO_PAT secret is configured
        env:
          TARGET_REPO_PAT: ${{ secrets.TARGET_REPO_PAT }}
        run: |
          if [ -z "$TARGET_REPO_PAT" ]; then
            echo "::error title=TARGET_REPO_PAT not configured::The TARGET_REPO_PAT repository secret is empty or unset on obaDev95/dependabot-batch-merge."
            echo "::error::Fix: Settings → Secrets and variables → Actions → New repository secret."
            echo "::error::Name: TARGET_REPO_PAT"
            echo "::error::Value: a fine-grained PAT (or classic PAT) with Contents: RW + Pull requests: RW on Maersk-Global/ui-myfinance."
            exit 1
          fi
          echo "TARGET_REPO_PAT is present."

      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.target-repo }}
          token: ${{ secrets.TARGET_REPO_PAT }}
          fetch-depth: 0
          persist-credentials: true

      # Mirror the auth pattern used by Maersk-Global/sync-myf-schemas
      # (.github/actions/setup-myf-runner): resolve Node from the target
      # repo's .nvmrc, write a GPR-scoped userconfig referencing
      # ${NODE_AUTH_TOKEN}, and export the userconfig path via $GITHUB_ENV
      # so the dependabot-batch-merge action's internal `npm ci` picks it up.
      - name: Resolve Node version
        id: nodever
        run: |
          set -euo pipefail
          if [ -f .nvmrc ]; then
            echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"
          else
            echo "version=lts/*" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nodever.outputs.version }}

      - name: Configure npm for GitHub Packages (Maersk scopes)
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::error::TARGET_REPO_PAT is empty — cannot authenticate to npm.pkg.github.com."
            exit 1
          fi
          NPMRC="${RUNNER_TEMP}/gh-packages.npmrc"
          # ui-myfinance pulls both @maersk-global/* and @Maersk-Global/* from GPR;
          # one scope line alone leaves the other without a token. ${NODE_AUTH_TOKEN}
          # is expanded by npm from the environment (secret never echoed).
          {
            echo '@maersk-global:registry=https://npm.pkg.github.com'
            echo '@Maersk-Global:registry=https://npm.pkg.github.com'
            echo '//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}'
          } > "$NPMRC"
          echo "NPM_CONFIG_USERCONFIG=$NPMRC" >> "$GITHUB_ENV"

      - name: Run dependabot-batch-merge
        uses: obaDev95/dependabot-batch-merge@main
        with:
          target-repo: ${{ inputs.target-repo }}
          validation-command: ${{ inputs.validation-command }}
          max-prs: ${{ inputs.max-prs }}
          close-source-prs: ${{ inputs.close-source-prs && 'true' || 'false' }}
          cursor-api-key: ${{ secrets.CURSOR_API_KEY }}
          github-token: ${{ secrets.TARGET_REPO_PAT }}
