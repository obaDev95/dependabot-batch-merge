name: 'Dependabot Batch Merge'
description: 'Batch open Dependabot PRs into one integration branch, validate each merge, open a single PR to the base branch.'
author: 'Omar Baldi'
branding:
  icon: 'git-merge'
  color: 'blue'

inputs:
  base-branch:
    description: 'Branch the integration branch is cut from and the batch PR targets.'
    required: false
    default: 'main'
  integration-branch-prefix:
    description: 'Prefix for the integration branch name. Date suffix is appended.'
    required: false
    default: 'chore/dependabot-batch'
  dependabot-author:
    description: 'GitHub login used to identify Dependabot PRs.'
    required: false
    default: 'dependabot[bot]'
  validation-command:
    description: 'Shell command run after each merge. Runs through bash -lc.'
    required: false
    default: 'npm ci && npm run typecheck && npm test && npm run build'
  on-failure:
    description: 'How to handle a PR that fails validation: "skip" (drop the merge) or "revert-commit" (keep merge, add revert).'
    required: false
    default: 'skip'
  re-run-final-suite:
    description: 'Re-run the validation command on the integration branch tip before opening the batch PR.'
    required: false
    default: 'true'
  draft-pr:
    description: 'Open the batch PR as a draft.'
    required: false
    default: 'true'
  max-prs:
    description: 'Maximum number of Dependabot PRs to process in one run (safety cap).'
    required: false
    default: '20'
  anthropic-api-key:
    description: 'Anthropic API key. Used for Claude-powered failure explanations and, when agentic-resolve is true, for autonomous fix attempts.'
    required: false
  agentic-resolve:
    description: 'When true, invoke a Claude agent to attempt to fix merge conflicts and validation failures before recording them as failures.'
    required: false
    default: 'false'
  agent-timeout-seconds:
    description: 'Per-attempt timeout in seconds for the Claude agent. Ignored when agentic-resolve is false.'
    required: false
    default: '600'
  max-agent-calls-per-batch:
    description: 'Hard cap on Claude agent invocations across the whole batch (cost guardrail).'
    required: false
    default: '10'
  max-batch-wall-clock-seconds:
    description: 'Hard cap on total batch wall-clock seconds; remaining PRs are skipped once exceeded.'
    required: false
    default: '3600'
  github-token:
    description: 'Token used for GitHub API calls. Defaults to the workflow GITHUB_TOKEN.'
    required: false
    default: ${{ github.token }}

outputs:
  batch-pr-number:
    description: 'Number of the batch PR opened or updated.'
  batch-pr-url:
    description: 'URL of the batch PR.'
  pass-count:
    description: 'Number of source PRs that PASSed validation.'
  fail-count:
    description: 'Number of source PRs that FAILed validation.'

runs:
  using: 'node20'
  main: 'dist/index.js'
